# Upgrade map — passes Upgrade header for WebSocket, closes for plain HTTP
map $http_upgrade $connection_upgrade {
    default  upgrade;
    ''       close;
}

# cPanel UI — port 2083
server {
    listen 2083;
    root /usr/share/nginx/cpanel;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # All API routes (including WebSocket /cpanel/terminal/ws).
    # The map above makes nginx upgrade to WS automatically when the client
    # sends an Upgrade header, and stay HTTP otherwise.
    location ~ ^/(cpanel|dev-token|whm/login|admin) {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# WHM UI — port 2087
server {
    listen 2087;
    root /usr/share/nginx/whm;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /whm/ {
        proxy_pass         http://api:3000/whm/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
